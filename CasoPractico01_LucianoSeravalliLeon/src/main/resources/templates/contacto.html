<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="general/fragmentos_general :: head"></head>
    <body>

        <div th:replace="general/fragmentos_general :: navbar"></div>
        <div th:replace="general/fragmentos_general :: mensajes"></div>

        <div class="container mt-5 mb-5">
            <div class="row justify-content-center">
                <div class="col-lg-6">

                    <div class="card shadow-lg border-0">
                        <div class="card-body p-4">

                            <h2 class="text-center mb-3">Contacto</h2>
                            <p class="text-center text-muted">
                                Envíanos tus quejas o sugerencias.
                            </p>

                            <form th:action="@{/contacto/enviar}" method="post">

                                <div class="mb-3">
                                    <label class="form-label">Nombre</label>
                                    <input type="text"
                                           class="form-control"
                                           name="nombre"
                                           placeholder="Tu nombre"
                                           required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Correo</label>
                                    <input type="email"
                                           class="form-control"
                                           name="correo"
                                           placeholder="tucorreo@email.com"
                                           required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Mensaje</label>
                                    <textarea class="form-control"
                                              name="mensaje"
                                              rows="4"
                                              placeholder="Escribe tu mensaje..."
                                              required></textarea>
                                </div>

                                <div class="d-grid">
                                    <button class="btn btn-primary" type="submit">
                                        <i class="fa-solid fa-paper-plane"></i>
                                        Enviar
                                    </button>
                                </div>

                            </form>

                        </div>
                    </div>

                </div>
            </div>
        </div>

        <div th:replace="general/fragmentos_general :: footer"></div>

    </body>
</html>
