<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="general/fragmentos_general :: head"></head>
    <body>

        <div th:replace="general/fragmentos_general :: navbar"></div>
        <div th:replace="general/fragmentos_general :: mensajes"></div>

        <div class="container mt-4">
            <div class="d-flex justify-content-between align-items-center">
                <h2>Reservas</h2>
                <a class="btn btn-primary" th:href="@{/reservas/nuevo}">
                    <i class="fa-solid fa-plus"></i> Nueva Reserva
                </a>
            </div>

            <hr>

            <table class="table table-striped table-hover mt-3">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Fecha</th>
                        <th>Servicio</th>
                        <th style="width: 180px;">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${reservas}">
                        <td th:text="${r.idReserva}"></td>
                        <td th:text="${r.nombreCliente}"></td>
                        <td th:text="${r.fecha}"></td>
                        <td th:text="${r.servicio.nombre}"></td>
                        <td>
                            <a class="btn btn-warning btn-sm"
                               th:href="@{/reservas/editar(idReserva=${r.idReserva})}">
                                <i class="fa-solid fa-pen"></i> Editar
                            </a>

                            <form th:action="@{/reservas/eliminar}" method="post" style="display:inline;">
                                <input type="hidden" name="idReserva" th:value="${r.idReserva}" />
                                <button class="btn btn-danger btn-sm" type="submit"
                                        onclick="return confirm('¿Eliminar esta reserva?');">
                                    <i class="fa-solid fa-trash"></i> Eliminar
                                </button>
                            </form>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(reservas)}">
                        <td colspan="5" class="text-center">No hay reservas registradas.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div th:replace="general/fragmentos_general :: footer"></div>
    </body>
</html>
