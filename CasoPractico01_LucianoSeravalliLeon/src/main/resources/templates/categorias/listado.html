<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="general/fragmentos_general :: head"></head>
    <body>

        <div th:replace="general/fragmentos_general :: navbar"></div>
        <div th:replace="general/fragmentos_general :: mensajes"></div>

        <div class="container mt-4">
            <div class="d-flex justify-content-between align-items-center">
                <h2>Categorías</h2>
                <a class="btn btn-primary" th:href="@{/categorias/nuevo}">
                    <i class="fa-solid fa-plus"></i> Nueva Categoría
                </a>
            </div>

            <hr>

            <table class="table table-striped table-hover mt-3">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th style="width: 180px;">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${categorias}">
                        <td th:text="${c.idCategoria}"></td>
                        <td th:text="${c.nombre}"></td>
                        <td>
                            <a class="btn btn-warning btn-sm"
                               th:href="@{/categorias/editar(idCategoria=${c.idCategoria})}">
                                <i class="fa-solid fa-pen"></i> Editar
                            </a>

                            <form th:action="@{/categorias/eliminar}" method="post" style="display:inline;">
                                <input type="hidden" name="idCategoria" th:value="${c.idCategoria}" />
                                <button class="btn btn-danger btn-sm" type="submit"
                                        onclick="return confirm('¿Eliminar esta categoría?');">
                                    <i class="fa-solid fa-trash"></i> Eliminar
                                </button>
                            </form>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(categorias)}">
                        <td colspan="3" class="text-center">No hay categorías registradas.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div th:replace="general/fragmentos_general :: footer"></div>
    </body>
</html>
